name: Refresh Profile Stats

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  refresh-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download github-stats binary
        run: |
          curl -L -o /tmp/github-stats https://github.com/jstrieb/github-stats/releases/latest/download/github-stats_x86_64-linux
          chmod +x /tmp/github-stats

      - name: Configure git identity
        run: |
          git config --global user.name "Robert Marks"
          git config --global user.email "36484284+robertmarks@users.noreply.github.com"

      - name: Generate stats images
        run: |
          /tmp/github-stats
        env:
          ACCESS_TOKEN: ${{ secrets.GRS_TOKEN }}
          EXCLUDE_REPOS: ${{ secrets.EXCLUDE_REPOS }}
          EXCLUDE_LANGS: ${{ secrets.EXCLUDE_LANGS }}
          EXCLUDE_PRIVATE: "false"
          SILENT: "true"
          MAX_RETRIES: "5"

      - name: Normalize overview.svg (transparent background, no border)
        run: |
          # jstrieb/github-stats bakes a white card + border into the binary's
          # template (no config flag), so normalize it post-generation:
          #  - drop the border stroke
          #  - make the card background transparent in light and dark
          # The SVG keeps its built-in :target color sets, so the README's
          # <picture> switch still drives correct text colors per theme.
          sed -i \
            -e 's/stroke: rgb(225, 228, 232);/stroke: none;/' \
            -e 's/fill: white;/fill: transparent;/' \
            -e 's/fill: #0d1117;/fill: transparent;/' \
            overview.svg

      - name: Generate LOC stats card SVG
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=robertmarks&theme=transparent&hide_border=true&layout=compact&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GRS_TOKEN }}

      - name: Commit generated files
        run: |
          git add overview.svg languages.svg profile/top-langs.svg
          git commit -m "chore: refresh profile stats" || exit 0
          git pull --rebase origin main
          git push origin main
