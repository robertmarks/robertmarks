name: Refresh Profile Stats

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  refresh-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # Our own fork of jstrieb/github-stats, patched so statistics.zig only
      # enumerates repos we OWN (ownerAffiliations: OWNER) instead of every repo
      # we've ever contributed to. That keeps all-time contribution totals and
      # the lines-of-code metric, without crashing on org repos we've left.
      - name: Check out patched github-stats fork
        uses: actions/checkout@v6
        with:
          repository: robertmarks/github-stats
          ref: master
          path: .github-stats-src

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          version: 0.16.0

      - name: Build patched github-stats
        run: zig build --release
        working-directory: .github-stats-src

      - name: Configure git identity
        run: |
          git config --global user.name "Robert Marks"
          git config --global user.email "36484284+robertmarks@users.noreply.github.com"

      # Detailed card (jstrieb style): all-time contributions, lines-of-code,
      # views, per-repo stars/forks — written to its own file so it lives
      # alongside the github-readme-stats card below.
      - name: Generate detailed stats card
        run: |
          ./.github-stats-src/zig-out/bin/github-stats
        env:
          ACCESS_TOKEN: ${{ secrets.GRS_TOKEN }}
          EXCLUDE_REPOS: ${{ secrets.EXCLUDE_REPOS }}
          EXCLUDE_LANGS: ${{ secrets.EXCLUDE_LANGS }}
          EXCLUDE_PRIVATE: "false"
          SILENT: "false"
          MAX_RETRIES: "5"
          OVERVIEW_OUTPUT_FILE: overview-detailed.svg
          LANGUAGES_OUTPUT_FILE: /tmp/languages-unused.svg

      - name: Normalize overview-detailed.svg (transparent background, no border)
        run: |
          # jstrieb/github-stats bakes a white card + border into the binary's
          # template (no config flag), so normalize it post-generation:
          #  - drop the border stroke
          #  - make the card background transparent in light and dark
          # The SVG keeps its built-in :target color sets, so the README's
          # <picture> switch still drives correct text colors per theme.
          sed -i \
            -e 's/stroke: rgb(225, 228, 232);/stroke: none;/' \
            -e 's/fill: white;/fill: transparent;/' \
            -e 's/fill: #0d1117;/fill: transparent;/' \
            overview-detailed.svg

      # Overview card from github-readme-stats — the theme-transparent summary
      # that currently lives on main. Kept so both cards refresh nightly.
      - name: Generate overview stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=robertmarks&theme=transparent&hide_border=true&show_icons=true&count_private=true&include_all_commits=false&hide_rank=true&hide=stars,contribs&show=prs_merged,prs_merged_percentage
          path: overview.svg
          token: ${{ secrets.GRS_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=robertmarks&theme=transparent&hide_border=true&layout=compact&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GRS_TOKEN }}

      - name: Commit generated files
        run: |
          git add overview.svg overview-detailed.svg profile/top-langs.svg
          git commit -m "chore: refresh profile stats" || exit 0
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
