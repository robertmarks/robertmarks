name: Refresh Profile Stats

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  refresh-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure git identity
        run: |
          git config --global user.name "Robert Marks"
          git config --global user.email "36484284+robertmarks@users.noreply.github.com"

      # Overview card is generated by github-readme-stats (via the readme-tools
      # action), which reads the account's own data and does NOT hard-fail on
      # partial GraphQL errors from SAML/org-gated contributions the way the old
      # jstrieb/github-stats binary did. Two files are produced (light + dark)
      # so the README <picture> can switch text colour per colour-scheme.
      - name: Generate overview stats card (light)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=robertmarks&hide_border=true&show_icons=true&count_private=true&include_all_commits=false&hide_rank=true&hide=stars,contribs&bg_color=00000000&title_color=1F6FEB&text_color=1F2328&icon_color=1F6FEB&show=prs_merged,prs_merged_percentage
          path: overview.svg
          token: ${{ secrets.GRS_TOKEN }}

      - name: Generate overview stats card (dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=robertmarks&hide_border=true&show_icons=true&count_private=true&include_all_commits=false&hide_rank=true&hide=stars,contribs&bg_color=00000000&title_color=58A6FF&text_color=C9D1D9&icon_color=58A6FF&show=prs_merged,prs_merged_percentage
          path: overview-dark.svg
          token: ${{ secrets.GRS_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=robertmarks&theme=transparent&hide_border=true&layout=compact&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GRS_TOKEN }}

      - name: Commit generated files
        run: |
          git add overview.svg overview-dark.svg profile/top-langs.svg
          git commit -m "chore: refresh profile stats" || exit 0
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
