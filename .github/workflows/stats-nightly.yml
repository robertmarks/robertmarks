name: Refresh Profile Stats

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  refresh-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download github-stats binary
        run: |
          curl -L -o /tmp/github-stats https://github.com/jstrieb/github-stats/releases/latest/download/github-stats_x86_64-linux
          chmod +x /tmp/github-stats

      - name: Check out generated branch
        run: |
          git config --global user.name "Robert Marks"
          git config --global user.email "36484284+robertmarks@users.noreply.github.com"
          git fetch origin generated || true
          if git ls-remote --exit-code --heads origin generated >/dev/null 2>&1; then
            git checkout -B generated origin/generated
          else
            git checkout -b generated
          fi

      - name: Generate stats images
        run: |
          /tmp/github-stats
        env:
          ACCESS_TOKEN: ${{ secrets.GRS_TOKEN }}
          EXCLUDE_REPOS: ${{ secrets.EXCLUDE_REPOS }}
          EXCLUDE_LANGS: ${{ secrets.EXCLUDE_LANGS }}
          EXCLUDE_PRIVATE: "false"
          SILENT: "true"
          MAX_RETRIES: "5"

      - name: Commit generated files
        run: |
          git add overview.svg languages.svg
          git commit -m "chore: refresh profile stats" || exit 0
          if git ls-remote --exit-code --heads origin generated >/dev/null 2>&1; then
            git pull --rebase origin generated
          fi
          git push --set-upstream origin generated
