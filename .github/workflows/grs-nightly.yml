name: Refresh Profile Stats

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate GRS card SVG
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=robertmarks&theme=transparent&show_icons=true&hide_border=true&include_all_commits=true&rank_icon=github&custom_title=GitHub%20Snapshot&hide=issues,stars&show=prs_merged
          path: profile/stats.svg
          token: ${{ secrets.GRS_TOKEN }}

      - name: Generate top languages card SVG
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=robertmarks&theme=transparent&hide_border=true&layout=compact&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GRS_TOKEN }}

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git commit -m "chore: refresh profile stats" || exit 0
          git push
